<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云端监控接收端</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; text-align: center; padding: 20px; }
        #remote-video { width: 100%; max-width: 640px; border: 4px solid #333; border-radius: 8px; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { padding: 10px; width: 200px; border-radius: 4px; border: none; font-size: 16px; text-align: center;}
        button { padding: 10px 20px; background: #00ff88; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold;}
        .control-panel { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>🌐 云端监控查看中心</h1>
    
    <div class="control-panel">
        <input type="text" id="target-id" placeholder="输入 Mate 20 的连接 ID">
        <button id="connect-btn">连接监控</button>
    </div>

    <video id="remote-video" autoplay playsinline></video>

    <script>
        const remoteVideo = document.getElementById('remote-video');
        const connectBtn = document.getElementById('connect-btn');
        const targetIdInput = document.getElementById('target-id');
        
        const peer = new Peer(); // 初始化自身的 P2P 节点

        connectBtn.onclick = () => {
            const targetId = targetIdInput.value.trim();
            if (!targetId) {
                alert("请输入发射端的 ID！");
                return;
            }

            connectBtn.innerText = "正在呼叫...";
            
            // 呼叫 Mate 20，因为是接收端，我们不需要传过去自己的摄像头（传 null）
            const call = peer.call(targetId, null);
            
            // 当收到 Mate 20 传过来的视频流时
            call.on('stream', (remoteStream) => {
                remoteVideo.srcObject = remoteStream;
                connectBtn.innerText = "已连接";
                connectBtn.style.background = "#444";
                connectBtn.style.color = "#aaa";
            });

            call.on('error', (err) => {
                alert("连接失败: " + err);
                connectBtn.innerText = "重试";
            });
        };
    </script>
</body>
</html>
