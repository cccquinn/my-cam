<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极速监控发射端</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 8px; max-width: 400px; margin: 20px auto; }
        input { padding: 10px; width: 80%; margin: 10px 0; border-radius: 4px; border: 1px solid #333; background: #2b2b2b; color: #fff; text-align: center; font-size: 16px; }
        button { padding: 12px 24px; background: #00ff88; color: #000; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; width: 85%; }
        #video { width: 100%; max-width: 400px; border-radius: 8px; margin-top: 15px; background: #000; display: none; }
        .status { color: #ffbc00; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>📱 纯外网监控发射端</h1>
    
    <div class="box">
        <input type="text" id="room-id" value="mycam888" placeholder="自定义监控暗号/房间名">
        <button id="start-btn">一键开启云端监控</button>
        <div id="status" class="status">点击上方按钮启动</div>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        
        let client;
        let publishTimer;

        startBtn.onclick = async () => {
            const topicName = document.getElementById('room-id').value.trim();
            if(!topicName) return alert("请输入监控暗号！");

            statusDiv.innerText = "正在连接云端高速通道...";
            startBtn.style.display = "none";

            // 连接公共免费的 MQTT 服务器（国内连接非常顺畅）
            client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

            client.on('connect', async () => {
                statusDiv.innerText = "云端通道已建立，正在启动摄像头...";
                
                try {
                    // 唤醒摄像头
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { ideal: "environment" }, width: 480, height: 360 }, // 480P 保证外网流畅度
                        audio: false
                    });
                    video.srcObject = stream;
                    video.style.display = "inline-block";

                    statusDiv.innerHTML = `🟢 监控已成功上云！<br>暗号：<span style="color:#00ff88">${topicName}</span>`;

                    // 开始循环向外网发送画面
                    startStreaming(topicName);

                } catch (err) {
                    statusDiv.innerText = "❌ 摄像头开启失败，请务必使用 HTTPS 网址打开！";
                }
            });

            client.on('error', () => { statusDiv.innerText = "❌ 云端服务器连接失败，请重试"; });
        };

        function startStreaming(topic) {
            // 每秒捕获 12 帧画面（既保证画面连贯，又不容易卡顿）
            publishTimer = setInterval(() => {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // 将画面压缩为 JPG 格式，0.5 代表中等画质（平衡流量与清晰度）
                    const base64Data = canvas.toDataURL('image/jpeg', 0.5);
                    
                    // 通过云端通道广播出去
                    client.publish('pocam/' + topic, base64Data, { qos: 0 });
                }
            }, 85); 
        }
    </script>
</body>
</html>
